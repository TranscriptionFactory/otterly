name: Release

on:
  push:
    tags: ["v*"]

jobs:
  signing_preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Verify updater signing credentials
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          tmp_file="$(mktemp)"
          printf 'signing-preflight\n' > "$tmp_file"
          pnpm tauri signer sign "$tmp_file" >/dev/null
          rm -f "$tmp_file" "$tmp_file.sig"

  generate-bindings:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.event_name == 'push' }}

      - run: pnpm install

      - name: Generate TypeScript bindings
        run: pnpm codegen

      - uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: src/lib/generated/bindings.ts

  release:
    needs: [signing_preflight, generate-bindings]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.event_name == 'push' }}

      - run: pnpm install

      - name: Download sidecar binary
        shell: bash
        run: |
          TARGET=""
          case "${{ matrix.args }}" in
            *aarch64-apple-darwin*) TARGET="aarch64-apple-darwin" ;;
            *x86_64-apple-darwin*)  TARGET="x86_64-apple-darwin" ;;
          esac
          pnpm sidecar $TARGET

      - name: Download TypeScript bindings
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: src/lib/generated

      - uses: tauri-apps/tauri-action@v0.6.2
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Badgerly ${{ github.ref_name }}"
          includeUpdaterJson: true
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=4096
