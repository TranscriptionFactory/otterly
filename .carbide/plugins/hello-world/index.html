<!doctype html>
<html>
  <head>
    <title>Hello World Plugin</title>
  </head>
  <body>
    <script>
      const rpc = {
        send(method, ...params) {
          const id = Math.random().toString(36).substring(7);
          window.parent.postMessage({ id, method, params }, "*");
          return new Promise((resolve, reject) => {
            const handler = (event) => {
              if (event.data.id === id) {
                window.removeEventListener("message", handler);
                if (event.data.error) reject(event.data.error);
                else resolve(event.data.result);
              }
            };
            window.addEventListener("message", handler);
          });
        },
      };

      async function init() {
        await rpc.send("commands.register", {
          id: "say_hello",
          label: "Say Hello",
          description: "Inserts greeting text at cursor",
          keywords: ["hello", "plugin", "demo"],
          icon: "sparkles",
        });

        window.addEventListener("message", async (event) => {
          const { method, params } = event.data;
          if (
            method === "command.execute" &&
            params[0] === "hello-world:say_hello"
          ) {
            const greeting =
              (await rpc.send("settings.get", "greeting_text")) ??
              "Hello from Carbide Plugin!";
            rpc.send("editor.replace_selection", greeting + " \u{1F680}");
            rpc.send("ui.show_notice", { message: "Hello inserted!" });
          }
        });
      }

      init();
    </script>
  </body>
</html>
