<!doctype html>
<html>
  <head>
    <title>Word Count Plugin</title>
  </head>
  <body>
    <script>
      const rpc = {
        send(method, ...params) {
          const id = Math.random().toString(36).substring(7);
          window.parent.postMessage({ id, method, params }, "*");
          return new Promise((resolve, reject) => {
            const handler = (event) => {
              if (event.data.id === id) {
                window.removeEventListener("message", handler);
                if (event.data.error) reject(event.data.error);
                else resolve(event.data.result);
              }
            };
            window.addEventListener("message", handler);
          });
        },
      };

      async function updateWordCount() {
        try {
          const text = await rpc.send("editor.get_value");
          const words = text.trim() ? text.trim().split(/\s+/).length : 0;
          await rpc.send(
            "ui.update_statusbar_item",
            "word-count-item",
            `${words} words (plugin)`,
          );
        } catch (e) {
          // Editor may not be open
        }
      }

      async function init() {
        await rpc.send("ui.add_statusbar_item", {
          id: "word-count-item",
          priority: 100,
          initial_text: "0 words (plugin)",
        });

        // Subscribe to editor events for reactive updates
        await rpc.send("events.on", "active-file-changed", "on-file-change");

        let last_event_time = 0;

        // Listen for pushed events
        window.addEventListener("message", (event) => {
          if (event.data.type === "event") {
            last_event_time = Date.now();
            updateWordCount();
          }
        });

        // Poll as fallback only when no recent events
        const settings = await rpc.send("settings.get_all");
        const interval = settings?.update_interval_ms ?? 2000;
        setInterval(() => {
          if (Date.now() - last_event_time > interval) updateWordCount();
        }, interval);

        updateWordCount();
      }

      init();
    </script>
  </body>
</html>
